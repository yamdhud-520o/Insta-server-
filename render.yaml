services:
  - type: web
    name: raj-thakur-messenger
    runtime: python
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME  # Change this
    plan: free
    region: singapore
    buildCommand: |
      pip install -r requirements.txt
    startCommand: |
      python app.py
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: raj-thakur-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.10.12

databases:
  - name: raj-thakur-db
    plan: free
    region: singapore
